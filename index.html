<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS | Shikhar Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap');

        body {
            background-color: #050505; /* और भी गहरा ब्लैक */
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 50px 10px;
            width: 100%;
            max-width: 900px;
            border-bottom: 1px solid #151515;
        }

        /* SS Logo Style */
        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            letter-spacing: 12px;
            color: #d4af37; /* मैटेलिक गोल्ड */
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .brand-sub {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: #888;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 300;
        }

        .founder {
            font-size: 0.6rem;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 25px;
            display: block;
            opacity: 0.8;
        }

        /* प्रोडक्ट्स ग्रिड */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            max-width: 900px;
            width: 100%;
            padding: 30px 0;
        }

        /* प्रोडक्ट कार्ड */
        .product-card {
            background: #0a0a0a;
            border: 1px solid #111;
            transition: all 0.4s ease;
            position: relative;
        }

        .product-card:hover {
            border-color: #d4af37;
            transform: scale(1.02);
        }

        .product-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            filter: brightness(0.9);
            transition: 0.4s;
        }

        .product-card:hover img {
            filter: brightness(1.1);
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-info h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #fff;
            font-weight: 500;
        }

        /* बाय बटन */
        .buy-btn {
            display: inline-block;
            padding: 12px 25px;
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .buy-btn:hover {
            background: #d4af37;
            color: #000;
        }

        footer {
            margin-top: 100px;
            font-size: 0.6rem;
            color: #222;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-top: 1px solid #111;
            padding-top: 20px;
            width: 100%;
            text-align: center;
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
            .brand-logo { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">SS</div>
        <div class="brand-sub">Shikhar Shop</div>
        <span class="founder">Curated by Shikhar Yadav</span>
    </header>

    <div class="product-grid">
        <div class="product-card">
            <img src="https://i.ibb.co/rfRB5q0T/Screenshot-2026-04-11-10-46-11-97-c4b2fae5edd267b2847f1b32e9bc41c3.jpg" alt="Reason T-shirt">
            <div class="product-info">
                <h3>Reason Tee</h3>
                <a href="https://fktr.in/caKKod0" target="_blank" class="buy-btn">Shop Now</a>
            </div>
        </div>

        </div>

    <footer>
        &copy; 2026 SS Digital Store | Exclusive Collection
    </footer>

</body>
</html>
